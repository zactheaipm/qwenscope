<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1025"/>
    </linearGradient>
    <linearGradient id="baselineFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="steeredFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowBlue">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow2">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="450" y="48" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700" letter-spacing="0.5">Behavioral Trait Profile</text>
  <text x="450" y="72" text-anchor="middle" fill="#94a3b8" font-size="13">Baseline vs Steered — 5 Agentic Traits with 15 Sub-behaviors</text>

  <!-- Radar chart center: 450, 340, radius: 200 -->
  <!-- Pentagon vertices (top, then clockwise):
       Autonomy (top): 450, 140
       Tool Use (top-right): 640.2, 271.0
       Persistence (bottom-right): 567.6, 483.0
       Risk Calibration (bottom-left): 332.4, 483.0
       Deference (top-left): 259.8, 271.0

       Using: cx + r*sin(i*72deg), cy - r*cos(i*72deg) for i=0..4
       i=0: 450 + 0, 340 - 200 = (450, 140)
       i=1: 450 + 200*sin(72) = 450 + 190.2, 340 - 200*cos(72) = 340 - 61.8 = (640.2, 278.2)
       i=2: 450 + 200*sin(144) = 450 + 117.6, 340 - 200*cos(144) = 340 + 161.8 = (567.6, 501.8)
       i=3: 450 - 117.6, 501.8 = (332.4, 501.8)
       i=4: 450 - 190.2, 278.2 = (259.8, 278.2)
  -->

  <!-- Grid rings -->
  <!-- 20% ring -->
  <polygon points="450,300 488,323.6 473.5,372.4 426.5,372.4 412,323.6" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  <!-- 40% ring -->
  <polygon points="450,260 526,307.1 497.1,404.7 402.9,404.7 374,307.1" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  <!-- 60% ring -->
  <polygon points="450,220 564.1,290.7 520.6,437.1 379.4,437.1 335.9,290.7" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  <!-- 80% ring -->
  <polygon points="450,180 602.2,274.2 544.1,469.5 355.9,469.5 297.8,274.2" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  <!-- 100% ring (outer) -->
  <polygon points="450,140 640.2,278.2 567.6,501.8 332.4,501.8 259.8,278.2" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- Axis lines -->
  <line x1="450" y1="340" x2="450" y2="140" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="450" y1="340" x2="640.2" y2="278.2" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="450" y1="340" x2="567.6" y2="501.8" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="450" y1="340" x2="332.4" y2="501.8" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="450" y1="340" x2="259.8" y2="278.2" stroke="#1e293b" stroke-width="0.5"/>

  <!-- Scale labels -->
  <text x="456" y="298" fill="#334155" font-size="8">0.2</text>
  <text x="456" y="258" fill="#334155" font-size="8">0.4</text>
  <text x="456" y="218" fill="#334155" font-size="8">0.6</text>
  <text x="456" y="178" fill="#334155" font-size="8">0.8</text>
  <text x="456" y="138" fill="#334155" font-size="8">1.0</text>

  <!-- Baseline polygon (moderate values: 0.45, 0.50, 0.40, 0.35, 0.55) -->
  <!-- Autonomy: 0.45 → 450, 340-90 = (450, 250)
       Tool Use: 0.50 → 450+95.1, 340-30.9 = (545.1, 309.1)
       Persistence: 0.40 → 450+47.0, 340+64.7 = (497.0, 404.7)
       Risk Cal: 0.35 → 450-41.2, 340+56.6 = (408.8, 396.6)
       Deference: 0.55 → 450-104.6, 340-34.0 = (345.4, 306.0)
  -->
  <polygon points="450,250 545.1,309.1 497.0,404.7 408.8,396.6 345.4,306.0"
           fill="url(#baselineFill)" stroke="#3b82f6" stroke-width="2" opacity="0.8"/>
  <!-- Baseline dots -->
  <circle cx="450" cy="250" r="4" fill="#3b82f6"/>
  <circle cx="545.1" cy="309.1" r="4" fill="#3b82f6"/>
  <circle cx="497.0" cy="404.7" r="4" fill="#3b82f6"/>
  <circle cx="408.8" cy="396.6" r="4" fill="#3b82f6"/>
  <circle cx="345.4" cy="306.0" r="4" fill="#3b82f6"/>

  <!-- Steered polygon (high autonomy, high tool use: 0.85, 0.80, 0.60, 0.50, 0.30) -->
  <!-- Autonomy: 0.85 → 450, 340-170 = (450, 170)
       Tool Use: 0.80 → 450+152.2, 340-49.4 = (602.2, 290.6)
       Persistence: 0.60 → 450+70.6, 340+97.1 = (520.6, 437.1)
       Risk Cal: 0.50 → 450-58.8, 340+80.9 = (391.2, 420.9)
       Deference: 0.30 → 450-57.1, 340-18.5 = (392.9, 321.5)
  -->
  <polygon points="450,170 602.2,290.6 520.6,437.1 391.2,420.9 392.9,321.5"
           fill="url(#steeredFill)" stroke="#10b981" stroke-width="2.5" filter="url(#glowGreen)" opacity="0.9"/>
  <!-- Steered dots -->
  <circle cx="450" cy="170" r="5" fill="#10b981" filter="url(#glowGreen)"/>
  <circle cx="602.2" cy="290.6" r="5" fill="#10b981" filter="url(#glowGreen)"/>
  <circle cx="520.6" cy="437.1" r="5" fill="#10b981" filter="url(#glowGreen)"/>
  <circle cx="391.2" cy="420.9" r="5" fill="#10b981" filter="url(#glowGreen)"/>
  <circle cx="392.9" cy="321.5" r="5" fill="#10b981" filter="url(#glowGreen)"/>

  <!-- Trait labels with sub-behaviors -->
  <!-- Autonomy (top) -->
  <text x="450" y="112" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="700">AUTONOMY</text>
  <text x="450" y="126" text-anchor="middle" fill="#64748b" font-size="9">decision independence / action initiation / permission avoidance</text>

  <!-- Tool Use (top-right) -->
  <text x="672" y="268" fill="#f8fafc" font-size="15" font-weight="700">TOOL USE</text>
  <text x="672" y="282" fill="#64748b" font-size="9">tool reach / proactive info</text>
  <text x="672" y="294" fill="#64748b" font-size="9">gathering / tool diversity</text>

  <!-- Persistence (bottom-right) -->
  <text x="600" y="530" fill="#f8fafc" font-size="15" font-weight="700">PERSISTENCE</text>
  <text x="600" y="544" fill="#64748b" font-size="9">retry willingness / strategy</text>
  <text x="600" y="556" fill="#64748b" font-size="9">variation / escalation reluctance</text>

  <!-- Risk Calibration (bottom-left) -->
  <text x="300" y="530" text-anchor="end" fill="#f8fafc" font-size="15" font-weight="700">RISK CALIBRATION</text>
  <text x="300" y="544" text-anchor="end" fill="#64748b" font-size="9">approach novelty / scope</text>
  <text x="300" y="556" text-anchor="end" fill="#64748b" font-size="9">expansion / uncertainty tolerance</text>

  <!-- Deference (top-left) -->
  <text x="228" y="268" text-anchor="end" fill="#f8fafc" font-size="15" font-weight="700">DEFERENCE</text>
  <text x="228" y="282" text-anchor="end" fill="#64748b" font-size="9">instruction literalness / challenge</text>
  <text x="228" y="294" text-anchor="end" fill="#64748b" font-size="9">avoidance / suggestion restraint</text>

  <!-- Delta annotations showing steering effect -->
  <!-- Arrow from baseline to steered on Autonomy axis -->
  <line x1="440" y1="248" x2="440" y2="175" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  <text x="428" y="210" text-anchor="end" fill="#10b981" font-size="10" font-weight="600">+0.40</text>

  <!-- Arrow on Tool Use axis -->
  <text x="580" y="290" fill="#10b981" font-size="10" font-weight="600">+0.30</text>

  <!-- Arrow on Deference axis (decrease) -->
  <text x="365" y="308" fill="#ef4444" font-size="10" font-weight="600">-0.25</text>

  <!-- Legend -->
  <g transform="translate(290, 620)">
    <rect x="0" y="0" width="320" height="50" rx="10" fill="#111827" stroke="#1e293b" stroke-width="1" filter="url(#softShadow2)"/>
    <line x1="30" y1="18" x2="60" y2="18" stroke="#3b82f6" stroke-width="2.5"/>
    <circle cx="45" cy="18" r="3.5" fill="#3b82f6"/>
    <text x="68" y="22" fill="#93c5fd" font-size="12" font-weight="500">Baseline</text>
    <line x1="160" y1="18" x2="190" y2="18" stroke="#10b981" stroke-width="2.5"/>
    <circle cx="175" cy="18" r="3.5" fill="#10b981"/>
    <text x="198" y="22" fill="#6ee7b7" font-size="12" font-weight="500">Steered (+autonomy)</text>
    <text x="160" y="40" text-anchor="middle" fill="#475569" font-size="9">Scores range 0.0 — 1.0 per sub-behavior (LLM judge)</text>
  </g>

  <!-- Branding -->
  <text x="450" y="694" text-anchor="middle" fill="#1e293b" font-size="11" letter-spacing="2">QWENSCOPE</text>
</svg>